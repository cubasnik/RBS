# RBS Node Configuration
# Lines starting with # are comments.
# Keys are case-insensitive; sections are [section].

[node]
# IP address of this RBS node (used as the default bind address for REST API
# and Prometheus exporter).  Override per-service in [api] or [oms] sections.
#   0.0.0.0  — bind on all interfaces (recommended for physical/VM stends)
#   127.0.0.1 — loopback only (safe default for local testing)
node_addr      = 0.0.0.0

[gsm]
cell_id        = 1
arfcn          = 60          # Absolute Radio Frequency Channel Number (P-GSM: 1-124)
tx_power_dbm   = 43.0        # Max: 46 dBm (40 W)
bsic           = 10          # Base Station Identity Code (0-63)
lac            = 1000        # Location Area Code
mcc            = 250         # Mobile Country Code (Russia)
mnc            = 1           # Mobile Network Code (MTS)
abis_transport = ipa_tcp     # Abis transport: sim | ipa_tcp
abis_interop_profile = osmocom # Interop profile: default | osmocom
abis_hb_interval_ms = 1000   # Health monitor period, ms
abis_rx_stale_ms = 10000     # If no RX longer than this -> DEGRADED
abis_keepalive_enabled = true # Active keepalive probe in ipa_tcp mode
abis_keepalive_idle_ms = 3000 # Send probe if no RX longer than this
bsc_addr       = 10.10.10.1  # BSC address for Abis/OML  (leave empty = simulation only)
bsc_port       = 3002        # Abis OML TCP port (IPA default)

[umts]
cell_id        = 2
uarfcn         = 10700       # WCDMA Band I DL: 10562-10838
tx_power_dbm   = 43.0
psc            = 64          # Primary Scrambling Code (0-511)
lac            = 1000
rac            = 1           # Routing Area Code
mcc            = 250
mnc            = 1
rnc_addr       = 20.20.20.1  # RNC address for Iub/NBAP   (leave empty = simulation only)
rnc_port       = 25412       # Iub NBAP SCTP port (TS 25.430)

[lte]
cell_id        = 3
earfcn         = 1800        # E-UTRA Band 3 (DL: 1800-2600 → 1805-1880 MHz)
tx_power_dbm   = 43.0
pci            = 300         # Physical Cell Identity (0-503)
tac            = 1           # Tracking Area Code
mcc            = 250
mnc            = 1
num_antennas   = 2           # Tx antenna ports: 1, 2 or 4
mme_addr       = 30.30.30.1  # MME S1AP address (real MME or test instance)
mme_port       = 36412        # S1AP SCTP/UDP port (TS 36.412); default 36412
cell_count     = 1           # Multi-cell LTE: number of LTE cells to spawn
cell_id_step   = 1           # Cell ID increment per additional LTE cell
earfcn_step    = 5           # EARFCN offset per additional LTE cell
pci_step       = 3           # PCI offset per additional LTE cell
s1u_port_base  = 2152        # Base local S1-U UDP port; +index per LTE cell
inter_site_distance_m = 500  # Simplified inter-site distance for SINR model

[nr]
cell_id        = 4
nr_arfcn       = 428000      # NR-ARFCN для n1 FDD DL (центр 2140 МГц, TS 38.101-1 §5.4.2.1)
band           = 1           # NR operating band (n1 = 2100 МГц FDD FR1, TS 38.101-1 §5.2)
pci            = 400         # NR Physical Cell Identity (0-1007, TS 38.211 §7.4.2)
gnb_du_id      = 1           # gNB-DU ID (36-бит, TS 38.473 §9.3.1.9)
gnb_cu_id      = 1           # gNB-CU ID (36-бит, TS 38.401 §9.3.1)
nr_cell_id     = 1           # NR Cell Identity (NCI, 36-бит = gNB-ID || Cell-ID)
ssb_period_ms  = 20          # SSB burst period: 5 | 10 | 20 | 40 | 80 | 160 мс (TS 38.213 §4.1)
tac            = 1           # Tracking Area Code (5GS)
mcc            = 250         # Mobile Country Code
mnc            = 1           # Mobile Network Code
cu_addr        = 127.0.0.1   # gNB-CU адрес для F1AP (TS 38.473)
cu_port        = 38472       # F1AP SCTP порт (стандартный: 38472)
num_antennas   = 4           # Число Tx/Rx антенных портов (MIMO)

[endc]
# EN-DC (E-UTRAN New Radio Dual Connectivity, TS 37.340)
# Параметры активируются только при запуске в режиме ALL (lte + nr одновременно).
enabled        = true        # true — автоматически установить EN-DC при старте
option         = 3a          # EN-DC вариант: 3 | 3a | 3x
                             #   3  = split-bearer, PDCP на MN (LTE)
                             #   3a = SCG bearer, весь трафик только через NR
                             #   3x = split-bearer, PDCP на SN (NR)
x2_addr        = 127.0.0.1   # X2 адрес Secondary Node (NR gNB) для SgNB Addition
x2_port        = 36422       # X2AP порт
enb_bearer_id  = 5           # E-RAB ID на Master Node (LTE), 1-15
scg_drb_id     = 1           # DRB ID на Secondary Node (NR), 1-11

[api]
port           = 8181        # REST API HTTP port
bind           = 0.0.0.0  # Bind address; use 0.0.0.0 to allow LAN/WSL2 access

[oms]
prometheus_enabled = true    # Enable /metrics OpenMetrics exporter
prometheus_bind    = 127.0.0.1
prometheus_port    = 9108

[logging]
level          = INFO        # DEBUG | INFO | WARNING | ERROR | CRITICAL
log_file       = rbs.log
format         = text        # text | json
